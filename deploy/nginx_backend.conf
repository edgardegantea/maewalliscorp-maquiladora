server {
    listen 80;
    server_name maquiladoraback.maewalliscorp.org;
    # Certbot redirigirá automáticamente a HTTPS; este bloque queda solo para el reto ACME
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name maquiladoraback.maewalliscorp.org;

    # ── SSL (Certbot completa estas rutas) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/maquiladoraback.maewalliscorp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maquiladoraback.maewalliscorp.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/maquiladora-back/current/public;
    index index.php;

    # ── Seguridad básica ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/maquiladora-back.access.log;
    error_log  /var/log/nginx/maquiladora-back.error.log;

    # ── Laravel: enrutar todo a index.php ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # ── Bloquear acceso a archivos sensibles ───────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ /\.(env|git|htaccess) {
        deny all;
    }
}
