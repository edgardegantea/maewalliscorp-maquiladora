server {
    listen 80;
    server_name maquiladora.maewalliscorp.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name maquiladora.maewalliscorp.org;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/maquiladora.maewalliscorp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maquiladora.maewalliscorp.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/maquiladora-front;
    index index.html;

    # ── Seguridad básica ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP: permite conectar solo al propio backend
    add_header Content-Security-Policy
      "default-src 'self'; connect-src 'self' https://maquiladoraback.maewalliscorp.org; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
      always;

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/maquiladora-front.access.log;
    error_log  /var/log/nginx/maquiladora-front.error.log;

    # ── SPA: todas las rutas caen en index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets con cache largo (Vite genera nombres con hash) ──────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloquear dotfiles ──────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }
}
